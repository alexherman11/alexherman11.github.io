<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Over</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230a0a2e'/><rect x='4' y='4' width='2' height='2' fill='%23ffcc00'/><rect x='10' y='4' width='2' height='2' fill='%23ffcc00'/><rect x='3' y='9' width='10' height='2' fill='%23ffcc00'/><rect x='5' y='11' width='6' height='2' fill='%23ffcc00'/></svg>">
<link rel="stylesheet" href="retro-base.css">
<style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }

    .game-over-container {
        text-align: center;
        max-width: 500px;
        padding: 2rem;
    }

    .game-over-title {
        font-family: 'Press Start 2P', cursive;
        font-size: 2rem;
        color: var(--heading-color);
        text-shadow: 3px 3px 0 #cc9900, 0 0 20px rgba(255,204,0,0.4);
        margin-bottom: 2rem;
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }

    .game-over-message {
        font-family: 'VT323', monospace;
        font-size: 1.4rem;
        color: var(--text-color);
        margin-bottom: 2rem;
        line-height: 1.6;
    }

    .game-over-options {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
    }

    .game-over-options a {
        font-family: 'Press Start 2P', cursive;
        font-size: 0.7rem;
        color: var(--link-color);
        text-decoration: none;
        padding: 0.75rem 1.5rem;
        border: 2px solid var(--border-outer);
        border-radius: 4px;
        background: var(--panel-bg);
        transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        display: inline-block;
        min-width: 250px;
    }

    .game-over-options a:hover {
        color: var(--heading-color);
        background: var(--border-outer);
        box-shadow: 0 0 15px rgba(136,136,204,0.5);
        text-shadow: none;
    }
</style>
</head>
<body>
    <div class="game-over-container">
        <div class="game-over-title">GAME OVER</div>
        <div class="rpg-window">
            <p class="game-over-message">
                The quest you seek does not exist...<br>
                Perhaps the path has been lost to time.
            </p>
            <div class="game-over-options">
                <a href="index.html">CONTINUE? -> Home</a>
                <a href="projects.html">QUEST LOG -> Projects</a>
            </div>
        </div>
    </div>
</body>
</html>
